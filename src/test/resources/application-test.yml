spring:
  datasource:
    url: jdbc:h2:mem:copier_v0_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

copier:
  auth:
    session:
      cookie-name: TEST_SESSION
      ttl: PT12H
      secure: false
  account-config:
    route-cache:
      backend: log
  mt5:
    signal-ingest:
      dedup-backend: memory
    follower-exec:
      realtime-dispatch:
        backend: local
  monitor:
    runtime-state:
      backend: database
      funds-stale-after: PT30S
      require-fresh-funds-for-ratio: true
    session-registry:
      backend: memory
