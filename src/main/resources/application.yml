spring:
  application:
    name: copier_v0
  jackson:
    time-zone: UTC
  datasource:
    url: ${MYSQL_URL:jdbc:h2:mem:copier_v0;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${MYSQL_USERNAME:sa}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: ${MYSQL_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
  data:
    redis:
      repositories:
        enabled: false

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

copier:
  auth:
    session:
      cookie-name: ${COPIER_AUTH_SESSION_COOKIE_NAME:COPIER_SESSION}
      ttl: ${COPIER_AUTH_SESSION_TTL:P7D}
      secure: ${COPIER_AUTH_SESSION_SECURE:false}
  security:
    credentials:
      secret: ${CREDENTIAL_SECRET:dev-credential-secret}
  account-config:
    route-cache:
      backend: ${COPIER_ACCOUNT_CONFIG_ROUTE_CACHE_BACKEND:${ACCOUNT_ROUTE_CACHE_BACKEND:log}}
      key-prefix: ${ACCOUNT_ROUTE_CACHE_KEY_PREFIX:copy}
  mt5:
    signal-ingest:
      path: /ws/trade
      bearer-token: ${MT5_SIGNAL_BEARER_TOKEN:dev-mt5-token}
      allow-query-token: true
      dedup-ttl: PT5M
      dedup-backend: ${COPIER_MT5_SIGNAL_INGEST_DEDUP_BACKEND:${MT5_SIGNAL_DEDUP_BACKEND:memory}}
      dedup-key-prefix: ${MT5_SIGNAL_DEDUP_KEY_PREFIX:copy:signal:dedup}
    follower-exec:
      path: /ws/follower-exec
      bearer-token: ${MT5_FOLLOWER_EXEC_BEARER_TOKEN:dev-follower-token}
      allow-query-token: true
      heartbeat-stale-after: PT15S
      realtime-dispatch:
        backend: ${COPIER_MT5_FOLLOWER_EXEC_REALTIME_DISPATCH_BACKEND:${FOLLOWER_EXEC_REALTIME_DISPATCH_BACKEND:local}}
        channel: ${COPIER_MT5_FOLLOWER_EXEC_REALTIME_DISPATCH_CHANNEL:${FOLLOWER_EXEC_REALTIME_DISPATCH_CHANNEL:copy:follower:dispatch}}
        node-id: ${COPIER_MT5_FOLLOWER_EXEC_REALTIME_DISPATCH_NODE_ID:${spring.application.name}:${random.uuid}}
  monitor:
    heartbeat-stale-after: ${MONITOR_HEARTBEAT_STALE_AFTER:PT10S}
    runtime-state:
      backend: ${COPIER_MONITOR_RUNTIME_STATE_BACKEND:${MONITOR_RUNTIME_STATE_BACKEND:database}}
      key-prefix: ${COPIER_MONITOR_RUNTIME_STATE_KEY_PREFIX:${MONITOR_RUNTIME_STATE_KEY_PREFIX:copy:runtime}}
      database-sync-interval: ${COPIER_MONITOR_RUNTIME_STATE_DATABASE_SYNC_INTERVAL:${MONITOR_RUNTIME_STATE_DATABASE_SYNC_INTERVAL:PT30S}}
      funds-stale-after: ${COPIER_MONITOR_RUNTIME_STATE_FUNDS_STALE_AFTER:${MONITOR_RUNTIME_STATE_FUNDS_STALE_AFTER:PT30S}}
      require-fresh-funds-for-ratio: ${COPIER_MONITOR_RUNTIME_STATE_REQUIRE_FRESH_FUNDS_FOR_RATIO:${MONITOR_RUNTIME_STATE_REQUIRE_FRESH_FUNDS_FOR_RATIO:true}}
      warmup-on-startup: ${COPIER_MONITOR_RUNTIME_STATE_WARMUP_ON_STARTUP:${MONITOR_RUNTIME_STATE_WARMUP_ON_STARTUP:true}}
    session-registry:
      backend: ${COPIER_MONITOR_SESSION_REGISTRY_BACKEND:${WS_SESSION_REGISTRY_BACKEND:memory}}
      key-prefix: ${WS_SESSION_REGISTRY_KEY_PREFIX:copy:ws}
      ttl: ${WS_SESSION_REGISTRY_TTL:PT2M}
  copy-engine:
    slippage:
      enabled: ${COPIER_COPY_ENGINE_SLIPPAGE_ENABLED:${COPY_ENGINE_SLIPPAGE_ENABLED:false}}
      fx-and-gold-max-pips: ${COPY_ENGINE_SLIPPAGE_FX_AND_GOLD_MAX_PIPS:10}
      other-symbol-max-price: ${COPY_ENGINE_SLIPPAGE_OTHER_SYMBOL_MAX_PRICE:20.0}

logging:
  level:
    com.zyc.copier_v0.modules.signal.ingest: INFO
    com.zyc.copier_v0.modules.account.config: INFO
    com.zyc.copier_v0.modules.copy.engine: INFO
